spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
  data:
    redis:
      host: 127.0.0.1      # Redis 服务器地址 (本地为 127.0.0.1)
      port: 6379           # Redis 端口号 (默认 6379)
      password:            # Redis 密码（无密码留空）
      database: 0          # 默认使用 0 号库
      timeout: 5000ms      # 连接超时时间
      lettuce:
        pool:
          max-active: 100  # 高并发下的最大连接数 (核心配置)
          max-wait: -1ms   # 连接池耗尽时无限等待
          max-idle: 10     # 最大空闲连接
          min-idle: 2      # 最小空闲连接
  datasource:
