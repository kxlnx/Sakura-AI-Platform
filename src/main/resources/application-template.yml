      host: 127.0.0.1      # Redis 服务器地址 (本地为 127.0.0.1)
      port: 6379           # Redis 端口号 (默认 6379)
#      password:            # Redis 密码（无密码留空）
      database: 0          # 默认使用 0 号库
      timeout: 2000ms      # 单次操作超时，快速失败
      lettuce:
        pool:
          max-active: 20   # 最大连接数
          max-wait: 1000ms # 连接池耗尽最多等 1s，避免线程卡死
          max-idle: 10
          min-idle: 5      # 预热 5 个连接，减少冷启动延迟
  datasource:
